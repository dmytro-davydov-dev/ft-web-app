name: Deploy ft-web-app to Firebase Hosting

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_DEV || 'flowterra-dev' }}

jobs:
  deploy:
    name: Build & Deploy (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type-check
        run: yarn typecheck

      - name: Verify env vars are set
        run: |
          echo "VITE_FIREBASE_API_KEY set: ${{ secrets.VITE_FIREBASE_API_KEY != '' }}"
          echo "VITE_FIREBASE_APP_ID set: ${{ secrets.VITE_FIREBASE_APP_ID != '' }}"
          echo "VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}"
          echo "VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}"

      - name: Build
        run: yarn build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SA_DEV }}
          # TODO(Phase 3 hardening): replace with WIF

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project "${{ env.PROJECT_ID }}" --non-interactive

      - name: Show hosting URL
        run: echo "✅ https://${{ env.PROJECT_ID }}.web.app"
